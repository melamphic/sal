id: salvia.aged_care.cd_register_aged_care
name: "Controlled Drug Register Entry (Aged Care)"
version: 1
currency_date: 2026-05-17
vertical: aged_care
countries: [NZ, AU, UK, US]
badge: "Made by Salvia v1"
disclaimer: standard
maintainer: "Salvia"

description: >
  Controlled-drug register entry for an aged care service. Captures a single
  CD operation — receipt from pharmacy, administration to a resident,
  destruction (loss/spoil/expiry), or transfer between locked storage.
  The system.drug_op widget writes the ledger row and records drug, strength,
  form, batch, expiry, quantity, operation type, witness confirmation, and
  running balance. Fields here capture clinical context and compliance notes
  that the ledger row alone does not carry.

purpose_per_regulator:
  NZ: "Misuse of Drugs Act 1975 + Misuse of Drugs Regulations 1977 reg 41 (controlled-drug records — receipt, administration, destruction, transfer); Medicines Act 1981; Pharmacy Council NZ Standards for Medicines Management; HQSC ARC Medication Chart guidance."
  AU: "State Drugs and Poisons Acts (e.g. NSW Poisons and Therapeutic Goods Reg 2008; Vic Drugs, Poisons and Controlled Substances Reg 2017; Qld Medicines and Poisons Act 2019) — S8 register requirements; Strengthened Aged Care Quality Standards Standard 5; ACQSC guidance on medication management."
  UK: "Misuse of Drugs Regulations 2001 reg 19, 20, 23 (Schedule 2 register entries — drug, date, name + address of recipient, quantity received/supplied, signature; Schedule 3 storage); Misuse of Drugs (Safe Custody) Regulations 1973; CQC Reg 12; NICE SC1 controlled drug section."
  US: "Controlled Substances Act 1970; DEA 21 CFR 1304 (recordkeeping — biennial inventory; receipt records on DEA Form 222 for Schedule II; destruction on DEA Form 41); 42 CFR 483.45(b)(3) (controlled drug accountability); state Pharmacy Boards."

linked_policy_defaults:
  - salvia.aged_care.controlled_drugs
  - salvia.aged_care.medication_management

tags: [controlled_drug, ledger, medication]

overall_prompt: |
  This form writes a controlled-drug ledger row via the system.drug_op widget.
  The widget captures drug, strength, form, batch, expiry, quantity, operation
  type (administer / receive / destroy / transfer / adjust), witness confirmation,
  and running balance — do NOT re-extract those from audio.
  AI may populate: clinical indication, prescription reference, source/destination,
  and clinician notes. Resident identity is from the resident record.

fields:
  - key: subject_ref
    label: Resident (administration only)
    type: system_field
    source: patient_record
    help_text: "Required when operation is 'administer'. Leave blank for receive / destroy / transfer."

  - key: subject_weight
    label: Resident weight (kg)
    type: system_field
    source: patient_record.weight_kg
    help_text: "Used for dose verification by the drug_op widget."

  - key: drug_op
    label: Controlled drug operation
    type: system.drug_op
    required: true
    ai_extract: false
    config:
      controlled_only: true
      confirm_required: true
    help_text: |
      Captures: operation type (administer / receive / destroy / transfer / adjust),
      drug, strength, form, batch, expiry, quantity in/out, witness confirmation, and
      the updated running balance. Witness confirmation is required for administer,
      dispense, and destroy per country rules.

  - key: schedule_classification
    label: Controlled drug schedule
    type: select
    required: true
    ai_extract: true
    help_text: "NZ: Class B/C; AU: S8/S4; UK: CD Sch 2/3/4/5; US: DEA II–V."
    config:
      options:
        - {label: "NZ Class B", value: "nz_b"}
        - {label: "NZ Class C", value: "nz_c"}
        - {label: "AU S8", value: "au_s8"}
        - {label: "AU S4 / S4 recordable", value: "au_s4"}
        - {label: "UK CD Schedule 2", value: "uk_sch2"}
        - {label: "UK CD Schedule 3", value: "uk_sch3"}
        - {label: "UK CD Schedule 4", value: "uk_sch4"}
        - {label: "UK CD Schedule 5", value: "uk_sch5"}
        - {label: "US DEA Schedule II", value: "us_2"}
        - {label: "US DEA Schedule III", value: "us_3"}
        - {label: "US DEA Schedule IV", value: "us_4"}
        - {label: "US DEA Schedule V", value: "us_5"}

  - key: indication
    label: Clinical indication
    type: text
    ai_extract: true
    help_text: "Brief reason for administration. Link to the relevant encounter note for full context."

  - key: prescription_reference
    label: Prescription / chart reference
    type: text
    ai_extract: true
    help_text: "Prescription ID or eMAR chart entry reference where the operation derives from a prescription or medication chart."

  - key: source_or_destination
    label: Supplier (receive) / destination (transfer / destroy)
    type: text
    ai_extract: true
    help_text: "Receive: supplier name and invoice/PO. Transfer: from-location → to-location. Destroy: reason and any external attendance or witnessed destruction method."

  - key: discrepancy_flag
    label: Discrepancy flagged
    type: button_group
    config:
      options:
        - {label: "No discrepancy", value: "no"}
        - {label: "Yes — incident report raised", value: "yes"}
    help_text: "If yes, raise a CD discrepancy incident report. UK: notify Accountable Officer. US: DEA Form 106. NZ: notify Medsafe / Medicines Control. AU: notify state Drugs and Poisons unit."

  - key: country_specific_notes
    label: Compliance notes
    type: long_text
    ai_extract: false
    label_per_country:
      NZ: "NZ MoDR 1977 reg 41 notes"
      AU: "AU state register notes"
      UK: "UK CD register reference"
      US: "US DEA / state notes"
    help_text: "Any additional country-specific compliance observation for this entry."
    config:
      placeholder_per_country:
        NZ: "Register kept for at least 10 years from date of last entry; entries indelible; no erasures; corrections by drawing a line through and signing."
        AU: "NSW: biannual physical inventory (March / September). Discrepancy reporting to state Drugs and Poisons Office. Storage in S8 safe."
        UK: "Quote the Salvia audit-record ID. Entries within 24 hours of transaction. Preserve register 2 years from date of last entry (MoDR 2001 reg 20)."
        US: "21 CFR §1304: 2-yr retention federal minimum; many states require longer. Loss/theft: DEA Form 106 within 1 business day. Destruction: DEA Form 41."

  - key: clinician_notes
    label: Clinician notes
    type: long_text
    ai_extract: true
