id: salvia.aged_care.falls_risk
name: "Falls Risk Assessment"
version: 1
currency_date: 2026-05-08
vertical: aged_care
countries: [NZ, AU, UK, US]
badge: "Made by Salvia v1"
disclaimer: standard
maintainer: "Salvia"

description: >
  Multifactorial falls-risk assessment performed at admission, after any fall,
  on transfer back from hospital, and at change of condition. Captures intrinsic
  factors (history, medications, vision, cognition, continence, balance/gait,
  postural BP), extrinsic factors (environment, footwear, aids), and a
  prioritised individualised falls prevention plan. Country-specific risk tools
  are referenced and recorded; the Salvia form does not replace them.

purpose_per_regulator:
  NZ: "Ngā Paerewa NZS 8134:2021 Section 3 (assessment, planning); HQSC Atlas of Healthcare Variation falls reduction; ACC injury prevention; interRAI section J / K (mood, fall risk) outputs feed this assessment."
  AU: "Strengthened Aged Care Quality Standards Standard 5 Outcome 5.3 (Clinical safety — falls); Aged Care Quality Indicators (NQI) Falls and Major Injury — quarterly reporting from 1 Jul 2021 onwards; Australian Commission on Safety and Quality in Health Care (ACSQHC) Falls in older people guidelines (2009, current)."
  UK: "NICE CG161 Falls in older people: assessing risk and prevention (Jun 2013, updated); NICE QS86 Falls in older people; CQC fundamental standards Reg 12; National Audit of Inpatient Falls (NAIF) framework adapted to social care."
  US: "42 CFR 483.25(d) F689 (accidents — adequate supervision and assistive devices to prevent accidents); MDS 3.0 v1.20.1 Section J1700–J1900 falls history and falls since admission/prior assessment."

linked_policy_defaults:
  - salvia.aged_care.falls_prevention
  - salvia.aged_care.medication_management
  - salvia.aged_care.care_planning
  - salvia.shared.health_safety_policy

tags: [falls, risk_assessment]

overall_prompt: |
  Capture the multifactorial falls assessment. Vitals (postural BP) and any
  observed gait/balance findings should come from the assessing clinician.
  Demographics and current medications come from the resident record. The AI
  may extract risk factors mentioned in the conversation (vision change,
  recent dizziness, fear of falling, sleep) but must NOT score the assessment;
  the clinician scores against the chosen tool.

fields:
  - key: subject_ref
    label: Resident
    type: system_field
    source: patient_record
    required: true

  - key: subject_age
    label: Age
    type: system_field
    source: patient_record.age

  - key: subject_medications
    label: Current medications (for review of falls-risk drugs)
    type: system_field
    source: patient_record.medications
    help_text: "Specifically scan for: psychotropics, opioids, benzodiazepines, antihypertensives, diuretics, hypnotics, anticonvulsants, anticholinergics, drugs causing hyponatraemia."

  - key: assessment_date
    label: Assessment date
    type: date
    required: true
    ai_extract: true

  - key: assessment_trigger
    label: Trigger for this assessment
    type: select
    required: true
    ai_extract: true
    config:
      options:
        - {label: "On admission", value: "admission"}
        - {label: "After a fall", value: "post_fall"}
        - {label: "Return from hospital", value: "post_hospital"}
        - {label: "Change of condition", value: "soc"}
        - {label: "Routine quarterly review", value: "quarterly"}
        - {label: "After medication change", value: "post_medication"}

  - key: tool_used
    label: Risk-screening tool used
    type: select
    required: true
    ai_extract: false
    config:
      options:
        - {label: "interRAI section J + K (NZ)", value: "interrai"}
        - {label: "Peninsula Health Falls Risk Assessment Tool (PH-FRAT) (AU common)", value: "phfrat"}
        - {label: "Ontario Modified STRATIFY", value: "stratify"}
        - {label: "MDS 3.0 J1700/J1900 with facility supplement (US)", value: "mds_supplement"}
        - {label: "Multifactorial assessment per NICE CG161 (UK)", value: "nice_multi"}
        - {label: "Other / facility-specific (record below)", value: "other"}
    label_per_country:
      NZ: "Default: interRAI section J + K outputs combined with clinical judgement."
      AU: "Default: PH-FRAT or facility tool aligned with ACSQHC guidelines."
      UK: "Default: multifactorial assessment per NICE CG161 — there is no single recommended score."
      US: "Default: MDS 3.0 J1700/J1900 history + facility multifactorial supplement."

  - key: tool_reference_id
    label: External tool / instrument reference ID
    type: text
    ai_extract: false
    help_text: "Where the tool generates its own ID (interRAI assessment ID, MDS ARD), record it here."

  - key: falls_history_12mo
    label: Falls in last 12 months
    type: long_text
    ai_extract: true
    help_text: "Number, dates, circumstances, injuries, hospitalisations."

  - key: fear_of_falling
    label: Fear of falling — resident self-report
    type: select
    ai_extract: true
    config:
      options:
        - {label: "Not afraid", value: "no_fear"}
        - {label: "Some fear, manages activities", value: "some"}
        - {label: "Significant fear, restricting activity", value: "significant"}

  - key: vision_status
    label: Vision status
    type: select
    ai_extract: true
    config:
      options:
        - {label: "Normal / corrected", value: "normal"}
        - {label: "Reduced — glasses worn", value: "reduced_glasses"}
        - {label: "Reduced — glasses but not worn", value: "reduced_unworn"}
        - {label: "Significantly impaired (cataract / macular degeneration / glaucoma)", value: "impaired"}

  - key: cognition_status
    label: Cognition status
    type: select
    ai_extract: true
    config:
      options:
        - {label: "Intact", value: "intact"}
        - {label: "Mild cognitive impairment", value: "mci"}
        - {label: "Mild dementia", value: "mild"}
        - {label: "Moderate dementia", value: "moderate"}
        - {label: "Severe dementia", value: "severe"}
        - {label: "Delirium present", value: "delirium"}

  - key: continence_status
    label: Continence status (urinary urgency / nocturia)
    type: long_text
    ai_extract: true
    help_text: "Urgency, frequency, nocturia — strong falls risk factor (toileting falls)."

  - key: gait_balance
    label: Gait and balance observation
    type: long_text
    required: true
    ai_extract: true
    help_text: "Describe gait (steady, ataxic, festinating, shuffling, antalgic), balance (Romberg, Tinetti or TUG result if measured), use of aids."

  - key: postural_bp
    label: Postural blood pressure (lying then standing at 1 and 3 min)
    type: text
    ai_extract: true
    help_text: "Format: lying / standing 1 min / standing 3 min. Drop ≥20 mmHg systolic OR ≥10 mmHg diastolic = orthostatic hypotension."

  - key: footwear_aids
    label: Footwear and mobility aid status
    type: long_text
    ai_extract: true
    help_text: "Footwear type, fit, support; aid type, condition, used appropriately."

  - key: medication_review_flag
    label: Falls-risk-increasing-drugs (FRIDs) review flagged
    type: select
    required: true
    ai_extract: true
    config:
      options:
        - {label: "Yes — refer to GP/pharmacist for medication review", value: "yes"}
        - {label: "Already reviewed in last 3 months", value: "reviewed_recent"}
        - {label: "No FRIDs identified", value: "no_frids"}

  - key: bone_health_status
    label: Bone health / osteoporosis status
    type: long_text
    ai_extract: true
    help_text: "Vit D, calcium, bisphosphonate / denosumab use, prior fragility fracture. Critical for fall+fracture risk."

  - key: environmental_audit
    label: Environmental factors in resident's room/space
    type: long_text
    ai_extract: true
    help_text: "Lighting (incl. nightlight), bed height, call bell within reach, clutter, rugs, cords, bathroom rails, chair height, slippery floors."

  - key: risk_score
    label: Risk score / level (per chosen tool)
    type: select
    required: true
    ai_extract: false
    config:
      options:
        - {label: "Low", value: "low"}
        - {label: "Moderate", value: "moderate"}
        - {label: "High", value: "high"}

  - key: prevention_plan
    label: Individualised falls prevention plan
    type: long_text
    required: true
    ai_extract: true
    help_text: |
      Top 3–5 prioritised interventions tailored to this resident: e.g. low-low
      bed, sensor mat, supervised toileting schedule, vitamin D, vision review,
      psychotropic deprescribing referral, strength/balance exercises, bedside
      commode at night, hip protector, footwear review.

  - key: review_date
    label: Plan review date
    type: date
    required: true
    ai_extract: true
