id: salvia.general_clinic.notifiable_disease_report
name: "Notifiable disease report"
version: 1
currency_date: 2026-05-08
vertical: general_clinic
countries: [NZ, AU, UK, US]
badge: "Made by Salvia v1"
disclaimer: standard
maintainer: "Salvia"

description: >
  Statutory public-health notification of a suspected or confirmed notifiable
  disease. Submission targets, timeliness, and disease lists differ by country
  (NZ Health Act 1956 Sch 1+2 to local Medical Officer of Health; AU NNDSS via
  state Public Health Unit; UK Health Protection (Notification) Regulations
  2010 to UKHSA; US state health department + CDC NNDSS).

purpose_per_regulator:
  NZ: "Health Act 1956 Sch 1+2 (notifiable diseases); Health (Infectious and Notifiable Diseases) Regulations 2016; Te Whatu Ora communication."
  AU: "National Notifiable Diseases Surveillance System (NNDSS); state Public Health Acts and Regulations (NSW PHA 2010; Vic PHWA 2008; Qld PHA 2005); Communicable Disease Network Australia case definitions."
  UK: "Health Protection (Notification) Regulations 2010; UKHSA notification form NOIDS; case definitions in Public Health Control of Disease Act 1984."
  US: "State communicable-disease reporting law (varies); CDC National Notifiable Diseases Surveillance System (NNDSS); CSTE position statements; HIPAA 164.512(b) public-health disclosure permitted."

linked_policy_defaults:
  - salvia.shared.privacy_policy
  - salvia.general_clinic.safeguarding
  - salvia.shared.info_security_policy

tags: [public_health, notifiable, incident]

overall_prompt: |
  This is a statutory disclosure. Patient identifiers are required by law for
  contact tracing — the privacy minimisation rules do not apply. Capture the
  disease, exposure, samples, and contact-tracing facts cleanly.

fields:
  - key: subject_ref
    label: "Patient"
    type: system_field
    source: patient_record
    required: true

  - key: subject_dob
    label: "Date of birth"
    type: system_field
    source: patient_record.date_of_birth
    required: true

  - key: subject_sex_at_birth
    label: "Sex recorded at birth"
    type: system_field
    source: patient_record.sex_at_birth

  - key: subject_address
    label: "Address"
    type: system_field
    source: patient_record.address
    pii: true
    required: true

  - key: subject_phone
    label: "Patient phone"
    type: system_field
    source: patient_record.phone
    pii: true

  - key: subject_id_number
    label: "Health identifier"
    type: system_field
    source: patient_record.health_identifier
    pii: true

  - key: subject_ethnicity
    label: "Ethnicity"
    type: system_field
    source: patient_record.ethnicity
    help_text: "Required for NZ EpiSurv equity analysis; AU Indigenous status; US race/ethnicity per CDC NNDSS."

  - key: subject_occupation
    label: "Occupation / school / care setting"
    type: text
    ai_extract: true
    help_text: "Critical for outbreak attribution: food handler, childcare worker, healthcare worker, school year, residential care."

