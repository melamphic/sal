site_name: Salvia Backend (sal)
site_description: Engineering documentation for the Salvia Go backend
repo_url: https://github.com/melamphic/sal
repo_name: melamphic/sal
edit_uri: ""

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.annotate
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Development:
      - Getting Started: development.md
      - Database: database.md
      - Testing: testing.md
  - Modules:
      - Authentication: auth.md
      - Audio & Recordings: audio.md
      - Forms: forms.md
      - Notes & Extraction: notes.md
      - Timeline & Notifications: timeline.md
      - Policy Engine: policy.md
      - Drugs & Controlled Substances: drugs.md
      - Incidents & SIRS/CQC: incidents.md
      - Consent & Pain: consent_pain.md
      - AI Drafts (audio → AI fill): ai_drafts.md
      - Admin Dashboard & Alerts: admin.md
      - Compliance Reports: reports.md
  - Backlog: backlog.md
  - Compliance: compliance.md
