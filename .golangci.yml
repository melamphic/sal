version: "2"

linters:
  enable:
    - errcheck       # No unchecked errors.
    - govet          # go vet checks.
    - staticcheck    # Advanced static analysis.
    - revive         # Style linting (replaces golint).
    - wrapcheck      # Errors from external packages must be wrapped.
    - noctx          # Functions calling HTTP or DB must accept context.
    - godot          # Comments must end with a period.
    - goimports      # Imports must be grouped and sorted.
    - misspell       # Catch typos in comments and strings.
    - unconvert      # Remove unnecessary type conversions.
    - unparam        # Report unused function parameters.

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: unexported-return
        severity: warning
        disabled: false

  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(
      - .WithMessage(
      - domain.Err

  godot:
    scope: declarations
    capital: false

issues:
  exclude-dirs:
    - sal_test_app
  exclude-rules:
    # Test files are exempt from some rules.
    - path: _test\.go
      linters:
        - wrapcheck
        - godot
    # These types are intentionally prefixed with their package name so
    # huma's global OpenAPI schema registry can distinguish them across packages.
    - text: "type name will be used as (clinic\\.ClinicResponse|staff\\.StaffResponse|staff\\.StaffListResponse|staff\\.StaffRecord|patient\\.SubjectResponse|patient\\.SubjectListResponse|patient\\.ContactListResponse|patient\\.ContactWithSubjectsResponse|audio\\.RecordingResponse|audio\\.CreateRecordingResponse|audio\\.RecordingListResponse|audio\\.DownloadURLResponse|forms\\.FormResponse|forms\\.FormListResponse|forms\\.FormVersionResponse|forms\\.FormVersionListResponse|forms\\.FormGroupResponse|forms\\.FormGroupListResponse|forms\\.FormStyleResponse|notes\\.NoteResponse|notes\\.NoteListResponse|notes\\.NoteFieldResponse|policy\\.PolicyFolderRecord|policy\\.PolicyRecord|policy\\.PolicyVersionRecord|policy\\.PolicyClauseRecord|policy\\.PolicyContent|policy\\.PolicyFolderResponse|policy\\.PolicyFolderListResponse|policy\\.PolicyClauseResponse|policy\\.PolicyClauseListResponse|policy\\.PolicyVersionResponse|policy\\.PolicyVersionListResponse|policy\\.PolicyResponse|policy\\.PolicyListResponse)"
      linters:
        - revive

  max-issues-per-linter: 0
  max-same-issues: 0
