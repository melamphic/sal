services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: salvia
      POSTGRES_USER: salvia
      POSTGRES_PASSWORD: salvia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salvia"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — open http://localhost:8025 to see all sent emails
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: true
      MP_SMTP_AUTH_ALLOW_INSECURE: true

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console — open http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: creates the salvia-audio bucket (used for audio + clinic logos)
  # so a fresh `make dev` doesn't hit S3 NoSuchBucket on first upload.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/salvia-audio
      "

  # Headless-Chromium-based HTML→PDF renderer used by the reports module
  # and signed clinical-note PDFs. We POST HTML + assets to /forms/chromium/
  # convert/html and get back a PDF byte stream.
  #
  # --chromium-restart-after=20 caps Chromium's per-process conversion count
  # so the inevitable memory drift gets reset before it bites — Gotenberg
  # forks a fresh Chromium after every 20 renders.
  gotenberg:
    image: gotenberg/gotenberg:8
    command:
      - gotenberg
      - --api-port=3000
      - --chromium-restart-after=20
      - --api-timeout=60s
    ports:
      - "3050:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
